name: Keep Supabase Alive

# Add these as GitHub Secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL      → your Supabase project URL
#   SUPABASE_ANON_KEY → your Supabase anon/public key

on:
  schedule:
    # Run every 3 days at 08:00 UTC (well within the 7-day inactivity window)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Query Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # A real database query via PostgREST — this counts as DB activity
          # and prevents Supabase from pausing the project.
          # Queries pg_catalog tables which always exist, limited to 1 row.
          response=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/rpc/now" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Status: $http_code"
          echo "Response: $body"

          # If the RPC doesn't exist, fall back to querying any table
          if [ "$http_code" -ge 400 ]; then
            echo "RPC 'now' not available, falling back to raw SQL via health endpoint..."
            response2=$(curl -s -w "\n%{http_code}" \
              "${SUPABASE_URL}/rest/v1/?limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              -H "Prefer: count=exact")
            http_code2=$(echo "$response2" | tail -1)
            echo "Fallback status: $http_code2"
            if [ "$http_code2" -ge 400 ]; then
              echo "::error::Supabase returned $http_code2 — project may be paused or secrets are misconfigured"
              exit 1
            fi
          fi
          echo "✓ Supabase database is alive"

      - name: Keep workflow alive
        run: |
          # Push a trivial commit to reset GitHub's 60-day inactivity timer,
          # preventing it from silently disabling this scheduled workflow.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/.keepalive
          git add .github/.keepalive
          git diff --quiet --cached && echo "No changes" || \
            (git commit -m "chore: keep-alive [skip ci]" && git push)
